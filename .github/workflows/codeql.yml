name: CodeQL

on:
  push:
    branches: ["develop", "master"]
  pull_request:
    branches: ["develop", "master"]
  schedule:
    - cron: '0 9 * * 0'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    
    runs-on: ${{ (matrix.language == 'swift' && 'macos-26') || 'ubuntu-latest' }}
    
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: actions
          build-mode: none
        - language: ruby
          build-mode: none
        - language: swift
          build-mode: manual

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Cache Swift packages
      if: matrix.language == 'swift'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: .spm-cache
        key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          spm-${{ runner.os }}-

    - name: Initialize CodeQL
      uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    - name: Run manual build steps
      if: matrix.build-mode == 'manual'
      run: |
        /Applications/Xcode_26.5.app/Contents/Developer/usr/bin/xcodebuild \
          build \
          -project Clipy.xcodeproj \
          -scheme Clipy \
          ARCH=arm64 \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          -clonedSourcePackagesDirPath "$GITHUB_WORKSPACE/.spm-cache/SourcePackages" \
          -packageCachePath "$GITHUB_WORKSPACE/.spm-cache/PackageCache" \
          -skipPackagePluginValidation \
          -skipMacroValidation

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
      with:
        category: "/language:${{matrix.language}}"
